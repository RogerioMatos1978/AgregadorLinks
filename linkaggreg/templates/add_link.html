{% extends "base.html" %}
{# CORREÇÃO #10: herda de base.html — flash messages e includes removidos daqui #}

{% block title %}Adicionar Link{% endblock %}

{% block content %}
    <div class="form-container">
        <h2>Adicionar Link</h2>
        <form method="post">
            <label for="title">Título</label>
            <input type="text" name="title" id="title" required>

            <label for="url">URL</label>
            <input type="url" name="url" id="url" required>

            <label for="description">Descrição</label>
            <textarea name="description" id="description"></textarea>

            <label for="expires_at">Data de validade</label>
            <input type="datetime-local" name="expires_at" id="expires_at">
            <small class="form-help">Deixe em branco para o link não expirar.</small>

            <label class="checkbox-line">
                <input type="checkbox" name="active" checked>
                Link ativo
            </label>

            <button type="submit">Adicionar</button>
        </form>
    </div>
{% endblock %}
